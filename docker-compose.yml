# App + Neo4j. Ollama stays native on the host (reached via host.docker.internal).
# Password: copy .env.example -> .env and set NEO4J_PASSWORD (default test12345).
services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-thesis
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-test12345}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:-test12345}\" 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build: .
    container_name: va-app
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-test12345}"
      OLLAMA_URL: "http://host.docker.internal:11434"
      NEO4J_AUTOSYNC: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
